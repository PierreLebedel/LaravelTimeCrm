name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, sqlite3, zip, fileinfo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install NPM dependencies (Laravel)
        run: npm ci

      - name: Install NPM dependencies (NativePHP)
        run: npm ci
        working-directory: vendor/nativephp/desktop/resources/electron

      - name: Create .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Set version
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        shell: bash

      - name: Publish NativePHP
        run: php artisan native:publish win x64
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NATIVEPHP_UPDATER_PROVIDER: github
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          NATIVEPHP_APP_VERSION: ${{ env.APP_VERSION }}