name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, sqlite3, zip, fileinfo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup GitHub CLI
        run: gh --version

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install NPM dependencies (Laravel)
        run: npm ci

      - name: Install NPM dependencies (NativePHP)
        run: npm ci
        working-directory: vendor/nativephp/desktop/resources/electron

      - name: Create .env
        run: |
          copy .env.example .env
          php artisan key:generate
        shell: cmd

      - name: Set version
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        shell: bash

      - name: Create draft release
        run: |
          gh release create "$env:GITHUB_REF_NAME" `
            --draft `
            --title "$env:GITHUB_REF_NAME" `
            --generate-notes
        shell: pwsh

      - name: Publish NativePHP
        run: php artisan native:publish win x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_PROVIDER: github
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          NATIVEPHP_APP_VERSION: ${{ env.APP_VERSION }}

      - name: Publish release
        run: gh release edit "$env:GITHUB_REF_NAME" --draft=false
        shell: pwsh