name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, sqlite3, zip, fileinfo
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: Get npm cache directory
        id: npm-cache
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ${{ runner.os }}-node-22-npm-${{ hashFiles('package-lock.json', 'vendor/nativephp/desktop/resources/electron/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-npm-

      - name: Install NPM dependencies (Laravel)
        run: npm ci --no-audit --prefer-offline

      - name: Install NPM dependencies (NativePHP)
        run: npm ci --no-audit --prefer-offline
        working-directory: vendor/nativephp/desktop/resources/electron

      - name: Create .env
        run: |
          copy .env.example .env
          powershell -Command "(Get-Content .env) -replace '^APP_KEY=.*$', 'APP_KEY=${{ secrets.NATIVEPHP_BUILD_APP_KEY }}' | Set-Content .env"
        shell: cmd

      - name: Set version
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        shell: bash

      - name: Ensure draft release exists
        run: |
          gh release view "$env:GITHUB_REF_NAME" --json tagName > $null 2>&1

          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:GITHUB_REF_NAME" `
              --draft `
              --title "$env:GITHUB_REF_NAME" `
              --generate-notes
          }
        shell: pwsh

      - name: Publish NativePHP
        run: php artisan native:publish win x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_PROVIDER: github
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          NATIVEPHP_APP_VERSION: ${{ env.APP_VERSION }}

      - name: Publish release
        run: gh release edit "$env:GITHUB_REF_NAME" --draft=false
        shell: pwsh
